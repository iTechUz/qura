
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCup Manager | Professional Tournament System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #f8fafc, #eff6ff);
            min-height: 100vh;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes winner-pulse {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); transform: scale(1); }
            50% { transform: scale(1.02); }
            70% { box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); transform: scale(1); }
        }
        .animate-winner {
            animation: winner-pulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes match-highlight {
            0% { transform: scale(1); border-color: #e2e8f0; }
            50% { transform: scale(1.05); border-color: #4f46e5; filter: brightness(1.1); }
            100% { transform: scale(1); border-color: #e2e8f0; }
        }
        .animate-match-update {
            animation: match-highlight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes path-draw {
            0% { height: 0; opacity: 0; }
            100% { height: 100%; opacity: 1; }
        }
        .animate-path-draw {
            animation: path-draw 0.8s ease-out forwards;
        }

        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bracket-connector {
            position: absolute;
            background: linear-gradient(to bottom, #4f46e5, transparent);
            z-index: -1;
        }

        @media print {
            aside, header, button, .print\:hidden {
                display: none !important;
            }
            main {
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
            }
            body {
                background: white !important;
            }
            .max-w-7xl {
                max-width: 100% !important;
            }
            .animate-winner {
                animation: none !important;
                box-shadow: none !important;
            }
            .animate-float, .animate-bounce {
                animation: none !important;
            }
            .shadow-xl, .shadow-2xl, .shadow-indigo-50 {
                box-shadow: none !important;
                border: 1px solid #e2e8f0 !important;
            }
            .bg-indigo-600 {
                background-color: #4f46e5 !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
            }
            .bg-slate-950 {
                background-color: #020617 !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "uuid": "https://esm.sh/uuid@^13.0.0",
    "zustand/": "https://esm.sh/zustand@^5.0.11/",
    "zustand": "https://esm.sh/zustand@^5.0.11"
  }
}
</script>
</head>
<body class="text-slate-900 antialiased">
    <div id="root"></div>
</body>
</html>
