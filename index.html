
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EduCup Manager | Professional Tournament System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" crossorigin="anonymous">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            min-height: 100vh;
            background-color: #f8fafc;
            color: #0f172a;
            overscroll-behavior-y: none; /* Disable pull-to-refresh style on mobile if needed */
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Dramatic Animations for Ceremony */
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(80px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
        }
        .animate-orbit { animation: orbit 3s linear infinite; }

        @keyframes sphere-float {
            0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
            50% { transform: translateY(-20px) scale(1.05); filter: brightness(1.3); }
        }
        .animate-sphere-float { animation: sphere-float 4s ease-in-out infinite; }

        @keyframes reveal-team {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
        }
        .animate-reveal { animation: reveal-team 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes slam-in {
            0% { transform: scale(4) rotate(10deg); opacity: 0; filter: brightness(3); }
            80% { transform: scale(0.9) rotate(-2deg); opacity: 1; filter: brightness(1.2); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
        }
        .animate-slam { animation: slam-in 0.4s ease-out forwards; }

        @keyframes ball-shake {
            0%, 100% { transform: rotate(0deg) scale(1.1); }
            20% { transform: rotate(-15deg) scale(1.2); }
            40% { transform: rotate(15deg) scale(1.1); }
            60% { transform: rotate(-15deg) scale(1.2); }
            80% { transform: rotate(15deg) scale(1.1); }
        }
        .animate-ball-shake { animation: ball-shake 0.3s ease-in-out infinite; }

        @keyframes light-burst {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
        .animate-burst { animation: light-burst 0.8s ease-out forwards; }

        @keyframes screen-shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, -5px); }
            20%, 40%, 60%, 80% { transform: translate(5px, 5px); }
        }
        .animate-screen-shake { animation: screen-shake 0.4s ease-in-out; }

        @keyframes particle-float {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translate(var(--tw-translate-x), var(--tw-translate-y)) scale(0); opacity: 0; }
        }
        .animate-particle { animation: particle-float 1.5s ease-out forwards; }

        @keyframes countdown-zoom {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            50% { transform: scale(1.2); opacity: 1; filter: blur(0); }
            100% { transform: scale(2); opacity: 0; }
        }
        .animate-countdown { animation: countdown-zoom 1s ease-in-out forwards; }

        /* Ceremony specific glassmorphism */
        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-effect::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(79, 70, 229, 0.1), transparent);
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }

        @media print {
            aside, header, nav, button, .print\:hidden { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; }
        }
    </style>
