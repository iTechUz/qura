
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCup Manager | Professional Tournament System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #f8fafc, #eff6ff);
            min-height: 100vh;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes shaker {
            0% { transform: translate(0,0) rotate(0); }
            20% { transform: translate(-5px, 5px) rotate(-5deg); }
            40% { transform: translate(5px, -5px) rotate(5deg); }
            60% { transform: translate(-5px, -5px) rotate(-5deg); }
            80% { transform: translate(5px, 5px) rotate(5deg); }
            100% { transform: translate(0,0) rotate(0); }
        }
        .animate-shaker {
            animation: shaker 0.15s ease-in-out infinite;
        }

        @keyframes ball-pop {
            0% { transform: scale(0) translateY(100px); opacity: 0; }
            70% { transform: scale(1.1) translateY(-20px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-ball-pop {
            animation: ball-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes lightning-flash {
            0% { opacity: 0; }
            10%, 30% { opacity: 1; background: white; }
            20%, 40% { opacity: 0; }
            100% { opacity: 0; }
        }
        .animate-flash {
            animation: lightning-flash 0.8s ease-out forwards;
        }

        @keyframes team-slide-in-left {
            0% { transform: translateX(-100px); opacity: 0; filter: blur(10px); }
            100% { transform: translateX(0); opacity: 1; filter: blur(0); }
        }
        @keyframes team-slide-in-right {
            0% { transform: translateX(100px); opacity: 0; filter: blur(10px); }
            100% { transform: translateX(0); opacity: 1; filter: blur(0); }
        }
        .animate-slide-left { animation: team-slide-in-left 0.5s ease-out forwards; }
        .animate-slide-right { animation: team-slide-in-right 0.5s ease-out forwards; }

        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media print {
            aside, header, button, .print\:hidden {
                display: none !important;
            }
            main { padding: 0 !important; margin: 0 !important; background: white !important; }
            body { background: white !important; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "uuid": "https://esm.sh/uuid@^13.0.0",
    "zustand/": "https://esm.sh/zustand@^5.0.11/",
    "zustand": "https://esm.sh/zustand@^5.0.11"
  }
}
</script>
</head>
<body class="text-slate-900 antialiased">
    <div id="root"></div>
</body>
</html>
